name: edu_verse
description: "EduVerse - A comprehensive educational platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  salomon_bottom_bar: ^3.3.2
  google_fonts: ^6.2.1
  
  # State Management
  flutter_bloc: ^9.0.0
  
  # Networking
  dio: ^5.7.0
  retrofit: ^4.1.0
  
  # DI
  get_it: ^8.0.2
  injectable: ^2.5.0
  
  # Navigation
  go_router: ^14.7.2
  
  # UI & Utils
  shimmer: ^3.0.0
  file_picker: ^8.1.4
  mobile_scanner: ^6.0.4
  pdf: ^3.11.1
  printing: ^5.13.2
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5
  path_provider: ^2.1.5
  intl: ^0.20.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  
  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Gemini_Generated_Image_isfwlxisfwlxisfw.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#4A6CF7"
  adaptive_icon_foreground: "assets/images/Gemini_Generated_Image_isfwlxisfwlxisfw.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
