name: edu_verse
description: "EduVerse - A comprehensive educational platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_bloc: ^9.0.0
  
  # Networking
  dio: ^5.7.0
  retrofit: ^4.1.0
  
  # DI
  get_it: ^8.0.2
  injectable: ^2.5.0
  
  # Navigation
  go_router: ^14.7.2
  
  # UI & Utils
  shimmer: ^3.0.0
  file_picker: ^8.1.4
  mobile_scanner: ^6.0.4
  pdf: ^3.11.1
  printing: ^5.13.2
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  freezed: ^2.4.7
  json_serializable: ^6.8.0
  retrofit_generator: ^9.1.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
